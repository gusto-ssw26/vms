<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1C1C1E">
<title>กัสโต้สุขสวัสดิ์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="light-mode">

<!-- ═══════════════════════════════════════════
     SPLASH SCREEN
══════════════════════════════════════════════ -->
<div id="splash" class="splash">
  <div class="splash-inner">
    <div class="splash-logo">
      <div class="splash-icon">🏘️</div>
      <h1 class="splash-title">กัสโต้สุขสวัสดิ์</h1>
      <p class="splash-sub">ระบบบริหารจัดการหมู่บ้าน</p>
    </div>
    <div class="splash-loader"><div class="loader-bar"></div></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════════════ -->
<div id="loginScreen" class="screen login-screen hidden">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">🏘️</div>
      <h2>กัสโต้สุขสวัสดิ์</h2>
      <p>ระบบบริหารจัดการหมู่บ้าน</p>
    </div>
    <div class="login-form">
      <div class="input-group">
        <label>ชื่อผู้ใช้ / บ้านเลขที่</label>
        <div class="input-wrap"><span class="input-icon">👤</span>
          <input type="text" id="loginUsername" placeholder="admin หรือ 1/1" autocomplete="username">
        </div>
      </div>
      <div class="input-group">
        <label>รหัสผ่าน</label>
        <div class="input-wrap"><span class="input-icon">🔒</span>
          <input type="password" id="loginPassword" placeholder="รหัสผ่าน" autocomplete="current-password">
          <button class="toggle-pass" onclick="togglePassword()">👁</button>
        </div>
      </div>
      <div id="loginError" class="login-error hidden">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
      <button class="btn-primary btn-login" onclick="doLogin()">
        <span>เข้าสู่ระบบ</span>
      </button>
    </div>
    <p class="login-hint">หมู่บ้านกัสโต้สุขสวัสดิ์ · ระบบสำหรับสมาชิกเท่านั้น</p>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     MAIN APP
══════════════════════════════════════════════ -->
<div id="app" class="app hidden">

  <!-- SIDEBAR (Tablet/Desktop) -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">🏘️</div>
      <div class="sidebar-info">
        <span class="sidebar-village">กัสโต้สุขสวัสดิ์</span>
        <span id="sidebarUserName" class="sidebar-user"></span>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <button class="btn-theme" onclick="toggleTheme()">
        <span id="themeIcon">🌙</span> <span id="themeLabel">Dark Mode</span>
      </button>
      <button class="btn-logout-side" onclick="doLogout()">🚪 ออกจากระบบ</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <!-- TOP BAR -->
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <h1 id="pageTitle" class="page-title">หน้าหลัก</h1>
      <div class="topbar-actions">
        <button class="btn-icon" onclick="toggleTheme()" title="เปลี่ยนธีม"><span id="themeIconTop">🌙</span></button>
        <div class="user-badge" onclick="toggleUserMenu()">
          <span id="userAvatar" class="user-avatar">A</span>
          <span id="topbarUserName" class="user-name"></span>
        </div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <div id="pageContent" class="page-content"></div>
  </main>

  <!-- BOTTOM TAB BAR (Mobile) -->
  <nav id="bottomNav" class="bottom-nav"></nav>

</div>

<!-- ═══════════════════════════════════════════
     MODAL OVERLAY
══════════════════════════════════════════════ -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div id="modalBox" class="modal-box" onclick="e=>e.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalContent" class="modal-content"></div>
    <div id="modalFooter" class="modal-footer"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toastContainer" class="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/residents.js"></script>
<script src="js/pages/vehicles.js"></script>
<script src="js/pages/payments.js"></script>
<script src="js/pages/invoices.js"></script>
<script src="js/pages/receipts.js"></script>
<script src="js/pages/announcements.js"></script>
<script src="js/pages/projects.js"></script>
<script src="js/pages/reports.js"></script>
</body>
</html>
